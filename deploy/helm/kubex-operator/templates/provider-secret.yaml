{{- if .Values.providers.aws.enabled }}
{{- if and .Values.providers.aws.accessKeyId .Values.providers.aws.secretAccessKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubex-operator.fullname" . }}-aws-credentials
  labels:
    {{- include "kubex-operator.labels" . | nindent 4 }}
type: Opaque
data:
  AWS_ACCESS_KEY_ID: {{ .Values.providers.aws.accessKeyId | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.providers.aws.secretAccessKey | b64enc | quote }}
  AWS_REGION: {{ .Values.providers.aws.region | default "us-east-1" | b64enc | quote }}
{{- end }}
{{- end }}
